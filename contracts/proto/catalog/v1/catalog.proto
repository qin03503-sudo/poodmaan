syntax = "proto3";

package catalog.v1;

option go_package = "github.com/podcast-platform/contracts/gen/go/catalog/v1;catalogv1";
option java_package = "com.podcast.catalog.v1";

import "google/type/datetime.proto";
import "common/v1/pagination.proto";

// CatalogService manages podcasts, episodes, and related metadata.
service CatalogService {
  // Get podcast details by ID
  rpc GetPodcast(GetPodcastRequest) returns (Podcast);
  
  // List podcasts with filters
  rpc ListPodcasts(ListPodcastsRequest) returns (ListPodcastsResponse);
  
  // Create a new podcast (creator only)
  rpc CreatePodcast(CreatePodcastRequest) returns (Podcast);
  
  // Update podcast metadata
  rpc UpdatePodcast(UpdatePodcastRequest) returns (Podcast);
  
  // Delete a podcast (creator or admin)
  rpc DeletePodcast(DeletePodcastRequest) returns (DeletePodcastResponse);
  
  // Get episode details by ID
  rpc GetEpisode(GetEpisodeRequest) returns (Episode);
  
  // List episodes for a podcast
  rpc ListEpisodes(ListEpisodesRequest) returns (ListEpisodesResponse);
  
  // Create a new episode (creator only)
  rpc CreateEpisode(CreateEpisodeRequest) returns (Episode);
  
  // Update episode metadata
  rpc UpdateEpisode(UpdateEpisodeRequest) returns (Episode);
  
  // Delete an episode
  rpc DeleteEpisode(DeleteEpisodeRequest) returns (DeleteEpisodeResponse);
  
  // Publish an episode
  rpc PublishEpisode(PublishEpisodeRequest) returns (Episode);
  
  // Unpublish an episode
  rpc UnpublishEpisode(UnpublishEpisodeRequest) returns (Episode);
  
  // Search podcasts and episodes (internal use by search service)
  rpc Search(SearchRequest) returns (SearchResponse);
}

// Podcast represents a podcast in the catalog.
message Podcast {
  string id = 1;
  string creator_id = 2;
  string title = 3;
  string description = 4;
  string cover_image_url = 5;
  string category = 6;
  string language = 7;
  PodcastStatus status = 8;
  int32 total_episodes = 9;
  string rss_feed_url = 10;
  google.type.DateTime created_at = 11;
  google.type.DateTime updated_at = 12;
}

enum PodcastStatus {
  PODCAST_STATUS_UNSPECIFIED = 0;
  DRAFT = 1;
  PUBLISHED = 2;
  ARCHIVED = 3;
}

// Episode represents an episode in a podcast.
message Episode {
  string id = 1;
  string podcast_id = 2;
  string title = 3;
  string description = 4;
  string audio_url = 5;
  int32 duration_seconds = 6;
  int32 episode_number = 7;
  int32 season_number = 8;
  EpisodeStatus status = 9;
  google.type.DateTime published_at = 10;
  string transcript_url = 11;
  repeated Chapter chapters = 12;
  string cover_image_url = 13;
}

enum EpisodeStatus {
  EPISODE_STATUS_UNSPECIFIED = 0;
  DRAFT = 1;
  READY = 2;
  PUBLISHED = 3;
  ARCHIVED = 4;
}

// Chapter represents a chapter marker in an episode.
message Chapter {
  int32 start_seconds = 1;
  string title = 2;
  string image_url = 3;
}

// Request messages
message GetPodcastRequest {
  string podcast_id = 1;
}

message ListPodcastsRequest {
  common.v1.Pagination pagination = 1;
  string category = 2;
  string language = 3;
  PodcastStatus status = 4;
  string creator_id = 5;
}

message ListPodcastsResponse {
  repeated Podcast podcasts = 1;
  int32 total_count = 2;
}

message CreatePodcastRequest {
  string title = 1;
  string description = 2;
  string category = 3;
  string language = 4;
  string rss_feed_url = 5;
}

message UpdatePodcastRequest {
  string podcast_id = 1;
  optional string title = 2;
  optional string description = 3;
  optional string category = 4;
  optional string language = 5;
  optional string rss_feed_url = 6;
}

message DeletePodcastRequest {
  string podcast_id = 1;
}

message DeletePodcastResponse {
  bool success = 1;
}

message GetEpisodeRequest {
  string episode_id = 1;
}

message ListEpisodesRequest {
  string podcast_id = 1;
  common.v1.Pagination pagination = 2;
  EpisodeStatus status = 3;
}

message ListEpisodesResponse {
  repeated Episode episodes = 1;
  int32 total_count = 2;
}

message CreateEpisodeRequest {
  string podcast_id = 1;
  string title = 2;
  string description = 3;
  int32 duration_seconds = 4;
  int32 episode_number = 5;
  int32 season_number = 6;
}

message UpdateEpisodeRequest {
  string episode_id = 1;
  optional string title = 2;
  optional string description = 3;
  optional int32 duration_seconds = 4;
  optional int32 episode_number = 5;
  optional int32 season_number = 6;
}

message DeleteEpisodeRequest {
  string episode_id = 1;
}

message DeleteEpisodeResponse {
  bool success = 1;
}

message PublishEpisodeRequest {
  string episode_id = 1;
  google.type.DateTime publish_at = 2;  // Optional: schedule for later
}

message UnpublishEpisodeRequest {
  string episode_id = 1;
}

message SearchRequest {
  string query = 1;
  common.v1.Pagination pagination = 2;
  string type = 3;  // "podcast" or "episode"
}

message SearchResponse {
  repeated Podcast podcasts = 1;
  repeated Episode episodes = 2;
  int32 total_count = 3;
}
