syntax = "proto3";

package search.v1;

option go_package = "github.com/podcast-platform/contracts/gen/go/search/v1;searchv1";
option java_package = "com.podcast.search.v1";

import "google/type/datetime.proto";
import "common/v1/pagination.proto";
import "catalog/v1/catalog.proto";

// SearchService provides search and discovery operations.
service SearchService {
  // Search podcasts and episodes
  rpc Search(SearchRequest) returns (SearchResponse);
  
  // Autocomplete suggestions
  rpc Autocomplete(AutocompleteRequest) returns (AutocompleteResponse);
  
  // Get trending content
  rpc GetTrending(GetTrendingRequest) returns (GetTrendingResponse);
  
  // Get discovery rails (personalized)
  rpc GetDiscoveryRails(GetDiscoveryRailsRequest) returns (GetDiscoveryRailsResponse);
  
  // Index a podcast (internal use by catalog service)
  rpc IndexPodcast(IndexPodcastRequest) returns (IndexPodcastResponse);
  
  // Remove podcast from index (internal)
  rpc RemovePodcast(RemovePodcastRequest) returns (RemovePodcastResponse);
  
  // Index an episode (internal use)
  rpc IndexEpisode(IndexEpisodeRequest) returns (IndexEpisodeResponse);
  
  // Remove episode from index (internal)
  rpc RemoveEpisode(RemoveEpisodeRequest) returns (RemoveEpisodeResponse);
}

message SearchRequest {
  string query = 1;
  SearchType type = 2;  // PODCAST, EPISODE, ALL
  repeated string categories = 3;
  repeated string languages = 4;
  int32 min_duration = 5;
  int32 max_duration = 6;
  bool premium_only = 7;
  common.v1.Pagination pagination = 8;
}

enum SearchType {
  SEARCH_TYPE_UNSPECIFIED = 0;
  PODCAST = 1;
  EPISODE = 2;
  ALL = 3;
}

message SearchResponse {
  repeated catalog.v1.Podcast podcasts = 1;
  repeated catalog.v1.Episode episodes = 2;
  int32 total_count = 3;
  repeated string suggestions = 4;  // Spelling corrections, etc.
}

message AutocompleteRequest {
  string query = 1;
  int32 max_results = 2;
}

message AutocompleteResponse {
  repeated AutocompleteSuggestion suggestions = 1;
}

message AutocompleteSuggestion {
  string text = 1;
  SuggestionType type = 2;
  string podcast_id = 3;  // If type is PODCAST
  string episode_id = 4;  // If type is EPISODE
}

enum SuggestionType {
  SUGGESTION_TYPE_UNSPECIFIED = 0;
  PODCAST = 1;
  EPISODE = 2;
  CATEGORY = 3;
}

message GetTrendingRequest {
  TrendingType type = 1;
  int32 limit = 2;
}

enum TrendingType {
  TRENDING_TYPE_UNSPECIFIED = 0;
  PODCASTS = 1;
  EPISODES = 2;
}

message GetTrendingResponse {
  repeated catalog.v1.Podcast podcasts = 1;
  repeated catalog.v1.Episode episodes = 2;
}

message GetDiscoveryRailsRequest {
  string user_id = 1;
  int32 rails_count = 2;
}

message GetDiscoveryRailsResponse {
  repeated Rail rails = 1;
}

message Rail {
  string title = 1;
  RailType type = 2;
  repeated RailItem items = 3;
}

enum RailType {
  RAIL_TYPE_UNSPECIFIED = 0;
  CONTINUE_LISTENING = 1;
  TRENDING = 2;
  PERSONALIZED = 3;
  CATEGORY = 4;
  EDITORIAL = 5;
}

message RailItem {
  string id = 1;
  RailItemType type = 2;
  string title = 3;
  string description = 4;
  string image_url = 5;
  string reason = 6;  // Why this is recommended
}

enum RailItemType {
  RAIL_ITEM_TYPE_UNSPECIFIED = 0;
  PODCAST = 1;
  EPISODE = 2;
}

message IndexPodcastRequest {
  catalog.v1.Podcast podcast = 1;
}

message IndexPodcastResponse {
  bool success = 1;
}

message RemovePodcastRequest {
  string podcast_id = 1;
}

message RemovePodcastResponse {
  bool success = 1;
}

message IndexEpisodeRequest {
  catalog.v1.Episode episode = 1;
}

message IndexEpisodeResponse {
  bool success = 1;
}

message RemoveEpisodeRequest {
  string episode_id = 1;
}

message RemoveEpisodeResponse {
  bool success = 1;
}
