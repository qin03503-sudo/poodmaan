syntax = "proto3";

package billing.v1;

option go_package = "github.com/podcast-platform/contracts/gen/go/billing/v1;billingv1";
option java_package = "com.podcast.billing.v1";

import "google/type/datetime.proto";
import "common/v1/money.proto";

// BillingService handles subscriptions, payments, and invoices.
service BillingService {
  // Create a checkout session for subscription
  rpc CreateCheckout(CreateCheckoutRequest) returns (CheckoutResponse);
  
  // Get current subscription
  rpc GetSubscription(GetSubscriptionRequest) returns (Subscription);
  
  // Update subscription (change plan)
  rpc UpdateSubscription(UpdateSubscriptionRequest) returns (Subscription);
  
  // Cancel subscription
  rpc CancelSubscription(CancelSubscriptionRequest) returns (CancelSubscriptionResponse);
  
  // Get invoices
  rpc ListInvoices(ListInvoicesRequest) returns (ListInvoicesResponse);
  
  // Process refund
  rpc ProcessRefund(RefundRequest) returns (RefundResponse);
  
  // Get payment methods
  rpc ListPaymentMethods(ListPaymentMethodsRequest) returns (ListPaymentMethodsResponse);
}

message Subscription {
  string id = 1;
  string user_id = 2;
  string plan_id = 3;
  SubscriptionStatus status = 4;
  google.type.DateTime current_period_start = 5;
  google.type.DateTime current_period_end = 6;
  bool cancel_at_period_end = 7;
  string payment_provider = 8;
  string provider_subscription_id = 9;
  google.type.DateTime created_at = 10;
  google.type.DateTime updated_at = 11;
}

enum SubscriptionStatus {
  SUBSCRIPTION_STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  CANCELLED = 2;
  PAST_DUE = 3;
  UNPAID = 4;
  TRIALING = 5;
}

message Plan {
  string id = 1;
  string name = 2;
  common.v1.Money price = 3;
  string currency = 4;
  string interval = 5;  // month, year
  int32 interval_count = 6;
  repeated string features = 7;
  bool active = 8;
}

message Invoice {
  string id = 1;
  string user_id = 2;
  string subscription_id = 3;
  string invoice_number = 4;
  common.v1.Money subtotal = 5;
  common.v1.Money tax = 6;
  common.v1.Money total = 7;
  InvoiceStatus status = 8;
  string receipt_url = 9;
  google.type.DateTime created_at = 10;
  google.type.DateTime paid_at = 11;
}

enum InvoiceStatus {
  INVOICE_STATUS_UNSPECIFIED = 0;
  OPEN = 1;
  PAID = 2;
  VOID = 3;
  UNCOLLECTIBLE = 4;
}

message PaymentTransaction {
  string id = 1;
  string user_id = 2;
  string subscription_id = 3;
  common.v1.Money amount = 4;
  string currency = 5;
  PaymentStatus status = 6;
  string payment_method = 7;
  string provider_transaction_id = 8;
  google.type.DateTime created_at = 9;
}

enum PaymentStatus {
  PAYMENT_STATUS_UNSPECIFIED = 0;
  SUCCEEDED = 1;
  FAILED = 2;
  PENDING = 3;
  REFUNDED = 4;
}

message CreateCheckoutRequest {
  string user_id = 1;
  string plan_id = 2;
  string success_url = 3;
  string cancel_url = 4;
}

message CheckoutResponse {
  string checkout_url = 1;
  string session_id = 2;
}

message GetSubscriptionRequest {
  string user_id = 1;
}

message UpdateSubscriptionRequest {
  string user_id = 1;
  string new_plan_id = 2;
  bool cancel_at_period_end = 3;
}

message CancelSubscriptionRequest {
  string user_id = 1;
  bool immediate = 2;
}

message CancelSubscriptionResponse {
  bool success = 1;
}

message ListInvoicesRequest {
  string user_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListInvoicesResponse {
  repeated Invoice invoices = 1;
  string next_page_token = 2;
}

message RefundRequest {
  string transaction_id = 1;
  common.v1.Money amount = 2;  // Optional: partial refund
  string reason = 3;
}

message RefundResponse {
  bool success = 1;
  string refund_id = 2;
}

message ListPaymentMethodsRequest {
  string user_id = 1;
}

message ListPaymentMethodsResponse {
  repeated PaymentMethod methods = 1;
}

message PaymentMethod {
  string id = 1;
  string type = 2;  // card, paypal, apple_pay
  string last_four = 3;
  string brand = 4;
  bool is_default = 5;
}
