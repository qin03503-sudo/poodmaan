name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Go Services Tests
  test-go:
    name: Test Go Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [
          services/auth-service,
          services/user-profile-service,
          services/catalog-service,
          services/creator-service,
          services/media-upload-service,
          services/media-processing-service,
          services/playback-auth-service,
          services/playback-session-service,
          services/playback-telemetry-service,
          services/user-library-service,
          services/search-service,
          services/billing-service,
          services/entitlement-service,
          services/notification-service,
          services/analytics-service,
          services/recommendation-service,
          services/moderation-service,
          services/ads-service,
          services/payout-service,
          services/export-batch-service
        ]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          go test ./... -v -cover -race
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test?sslmode=disable
      
  # Go Linting
  lint-go:
    name: Lint Go Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Run gofmt check
        run: |
          unformatted=$$(gofmt -l services/)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi
      
      - name: Run go vet
        run: |
          for service in services/*/; do
            echo "Vetting $$service..."
            cd $$service && go vet ./... && cd ../..
          done
      
  # Frontend Tests
  test-frontend:
    name: Test Frontend Apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [apps/web, apps/creator-studio, apps/admin-console, packages/ui]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Run lint
        run: |
          cd ${{ matrix.app }}
          pnpm lint
      
      - name: Run tests
        run: |
          cd ${{ matrix.app }}
          pnpm test
      
  # Protobuf Checks
  proto-check:
    name: Check Proto Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Buf
        uses: bufbuild/buf-action@v1
        with:
          version: '1.32.0'
      
      - name: Lint protos
        run: |
          cd contracts/proto
          buf lint
      
      - name: Check breaking changes
        run: |
          cd contracts/proto
          buf breaking --against '.git#branch=main'
      
  # Contract Tests
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Generate API clients
        run: |
          cd contracts/proto
          buf generate
      
      - name: Run contract tests
        run: |
          cd packages/web-api-client
          pnpm test
      
  # Build Docker Images
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-go, test-frontend, lint-go, proto-check]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    strategy:
      matrix:
        include:
          - service: auth-service
            context: services/auth-service
            dockerfile: deploy/docker/go-service.Dockerfile
          - service: web
            context: apps/web
            dockerfile: deploy/docker/nextjs.Dockerfile
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            podcast/${{ matrix.service }}:latest
            podcast/${{ matrix.service }}:${{ github.sha }}
