services:
  postgres:
    image: postgres:15-alpine
    container_name: podcast-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: podcast_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: podcast-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  deps:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    command: sh -lc "corepack enable pnpm && pnpm install --frozen-lockfile=false"

  creator-studio:
    image: node:22-alpine
    container_name: podcast-creator-studio
    working_dir: /workspace
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: podcast_db
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: podcast-storage
      MINIO_PUBLIC_URL: http://localhost:9000
    ports:
      - "3001:3001"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: sh -lc "corepack enable pnpm && pnpm --filter @poodmaan/creator-studio dev"

  web:
    image: node:22-alpine
    container_name: podcast-web
    working_dir: /workspace
    environment:
      ADMIN_API_URL: http://creator-studio:3001/api
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      deps:
        condition: service_completed_successfully
      creator-studio:
        condition: service_started
    command: sh -lc "corepack enable pnpm && pnpm --filter @poodmaan/web dev"

volumes:
  postgres_data:
  minio_data:
  node_modules:
  pnpm_store:
