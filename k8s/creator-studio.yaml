apiVersion: apps/v1
kind: Deployment
metadata:
  name: creator-studio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: creator-studio
  template:
    metadata:
      labels:
        app: creator-studio
    spec:
      containers:
        - name: creator-studio
          image: poodmaan:dev
          imagePullPolicy: Never
          workingDir: /workspace
          command: ["sh", "-lc", "pnpm --filter @poodmaan/creator-studio dev"]
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: poodmaan-config
            - secretRef:
                name: poodmaan-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: creator-studio
spec:
  type: NodePort
  selector:
    app: creator-studio
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      nodePort: 30081
