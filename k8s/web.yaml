apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: poodmaan:dev
          imagePullPolicy: Never
          workingDir: /workspace
          command: ["sh", "-lc", "pnpm --filter @poodmaan/web dev"]
          ports:
            - containerPort: 3000
          env:
            - name: ADMIN_API_URL
              valueFrom:
                configMapKeyRef:
                  name: poodmaan-config
                  key: ADMIN_API_URL
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
