packages:
  - "apps/*"
  - "packages/*"
  - "tools/*"

catalog:
  - name: "@podcast-platform/ui"
    location: "packages/ui"
    style: any
    namespace: shared

  - name: "@podcast-platform/player-core"
    location: "packages/player-core"
    style: any
    namespace: shared

  - name: "@podcast-platform/web-api-client"
    location: "packages/web-api-client"
    style: any
    namespace: shared

  - name: "@podcast-platform/creator-api-client"
    location: "packages/creator-api-client"
    style: any
    namespace: shared

  - name: "@podcast-platform/admin-api-client"
    location: "packages/admin-api-client"
    style: any
    namespace: shared

  - name: "@podcast-platform/shared-types"
    location: "packages/shared-types"
    style: any
    namespace: shared

  - name: "@podcast-platform/eslint-config"
    location: "packages/eslint-config"
    style: any
    namespace: shared

  - name: "@podcast-platform/ts-config"
    location: "packages/ts-config"
    style: any
    namespace: shared

  - name: "@podcast-platform/feature-flags-client"
    location: "packages/feature-flags-client"
    style: any
    namespace: shared

onlyBuiltDependencies:
  - "esbuild"
  - "next"

dependenciesMeta:
  "@next/esbuild":
    built: true

engine: ">=14"

npmRegistry: "https://registry.npmjs.org/"

publishConfig:
  registry: "https://registry.npmjs.org/"
