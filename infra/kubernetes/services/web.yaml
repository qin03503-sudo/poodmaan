apiVersion: apps/v1"
kind: Deployment"
metadata:
  name: web"
  namespace: podcast"
spec:
  replicas: 3"
  selector:
    matchLabels:
      app: web"
  template:
    metadata:
      labels:
        app: web"
    spec:
      containers:
      - name: web"
        image: podcast/web:latest"
        ports:
        - containerPort: 3000"
        env:
        - name: API_BASE_URL"
          value: "http://api-gateway.podcast.svc.cluster.local""
        resources:
          requests:
            memory: "256Mi""
            cpu: "200m""
          limits:
            memory: "512Mi""
            cpu: "500m""
        livenessProbe:
          httpGet:
            path: "/""
            port: 3000"
          initialDelaySeconds: 10"
          periodSeconds: 10"
      imagePullSecrets:
      - name: regcred"
---
apiVersion: v1"
kind: Service"
metadata:
  name: web"
  namespace: podcast"
spec:
  selector:
    app: web"
  ports:
  - port: 80"
    targetPort: 3000"
  type: ClusterIP"
