version: v1
name: buf.build/podcast-platform/contracts
deps:
  - buf.build/googleapis/googleapis
  - buf.build/protocolbuffers/googleapis

lint:
  use:
    - STANDARD
    - UNARY_RPC
  except:
    - FIELD LOWER_SNAKE_CASE
  ignore:
    - google/type/datetime.proto

breaking:
  use:
    - FILE
  ignore_unstable_packages: true
